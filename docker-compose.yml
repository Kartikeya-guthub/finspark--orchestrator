services:
  postgres:
    image: postgres:16-alpine
    container_name: finspark-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finspark}
      POSTGRES_USER: ${POSTGRES_USER:-finspark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finspark}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finspark} -d ${POSTGRES_DB:-finspark}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: finspark-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: finspark-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    image: alpine:3.21
    container_name: finspark-web-stub
    command: ["sh", "-c", "sleep infinity"]
    profiles: ["app-stubs"]

  api:
    image: alpine:3.21
    container_name: finspark-api-stub
    command: ["sh", "-c", "sleep infinity"]
    profiles: ["app-stubs"]

  ai-service:
    image: alpine:3.21
    container_name: finspark-ai-service-stub
    command: ["sh", "-c", "sleep infinity"]
    profiles: ["app-stubs"]

  simulator:
    image: alpine:3.21
    container_name: finspark-simulator-stub
    command: ["sh", "-c", "sleep infinity"]
    profiles: ["app-stubs"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
